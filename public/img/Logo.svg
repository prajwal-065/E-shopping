<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main-text {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      fill: white;
      stroke: black;
      stroke-width: 3;
      letter-spacing: 5px;
    }
    .shadow {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      fill: none;
      stroke: black;
      stroke-width: 6;
      opacity: 0.8;
    }
  </style>

  <!-- Shadow (slightly offset) -->
  <text x="50%" y="110" text-anchor="middle" class="shadow" font-size="100" transform="translate(4,4)">
    SPOT
  </text>
  <text x="50%" y="220" text-anchor="middle" class="shadow" font-size="100" transform="translate(4,4)">
    LIGHT
  </text>

  <!-- Main Text -->
  <text x="50%" y="110" text-anchor="middle" class="main-text" font-size="100">
    SPOT
  </text>
  <text x="50%" y="220" text-anchor="middle" class="main-text" font-size="100">
    LIGHT
  </text>
</svg>