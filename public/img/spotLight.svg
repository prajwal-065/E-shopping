<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      fill: none;
      stroke: black;
      stroke-width: 2;
      letter-spacing: 6px;
    }
  </style>

  <!-- White Background -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Text -->
  <text x="50%" y="80" text-anchor="middle" class="text" font-size="60">
    SPOT
  </text>
  <text x="50%" y="150" text-anchor="middle" class="text" font-size="60">
    LIGHT
  </text>
</svg>
